<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>SYSTEM ADMINISTRATORA FINAL PRO MAX+</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:white; padding:20px; border-radius:10px; max-width:1200px; margin:auto; }

input, select, textarea { width:100%; padding:8px; margin-bottom:10px; }

button { padding:8px; background:#007bff; color:white; border:none; border-radius:6px; cursor:pointer; }

table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ddd; padding:6px; font-size:13px; text-align:center; }

img { max-width:60px; cursor:pointer; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>📊 SYSTEM ADMINISTRATORA FINAL PRO MAX+</h1>

<h3>➕ Nowe zgłoszenie</h3>

<label>Ulica</label>
<select id="ulica"></select>

<label>Budynek</label>
<select id="budynek"></select>

<label>Lokal</label>
<input id="lokal">

<label>Dział</label>
<select id="dzial"></select>

<label>Typ zgłoszenia</label>
<select id="typ"></select>

<label>Opis</label>
<textarea id="opis"></textarea>

<label>Wykonawca</label>
<select id="wykonawca">
<option>Konserwator 1</option>
<option>Konserwator 2</option>
<option>Konserwator 3</option>
<option>Inne</option>
</select>

<input id="wykonawca_inne" class="hidden" placeholder="Wpisz wykonawcę">

<label>Data zgłoszenia</label>
<input type="datetime-local" id="data_zgl">

<label>Zdjęcie</label>
<input type="file" id="foto">

<button onclick="dodaj()">Dodaj zgłoszenie</button>

<table>
<thead>
<tr>
<th>ID</th><th>Adres</th><th>Dział</th><th>Typ</th>
<th>Zdjęcie</th>
<th>Wykonawca</th><th>Status</th>
<th>Data</th><th>Reakcja</th><th>Realizacja</th><th>Akcja</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<hr>

<h2>📊 RAPORTY</h2>
<p>Wszystkie: <span id="r_total">0</span></p>
<p>Nowe: <span id="r_new">0</span></p>
<p>W trakcie: <span id="r_prog">0</span></p>
<p>Zakończone: <span id="r_done">0</span></p>

</div>

<script>

// 🔥 BAZA
const baza = {
"Góralska":["5","7","9","11","37","39","41","43","51","53","55","57","59","61","63","65","67","69","71"],
"Leśna Góra":["5","8","23","25","27","29"],
"Mazowiecka":["3","5","7"],
"Trawki":["9","11","13","15","17"]
};

// 🔥 KATALOG
const katalog = {
"gazowe":["awaria piecyka","nieszczelność instalacji","zapach gazu","inne - patrz opis"],
"elektryczne":["brak prądu","zwarcie instalacji","awaria oświetlenia","inne - patrz opis"],
"wodne":["wyciek wody","zalanie lokalu","awaria pionu","inne - patrz opis"],
"porządkowe":["śmieci","sprzątanie","inne - patrz opis"]
};

let lista = [];
let id = 1;

// 🔥 INIT
window.addEventListener("load", function(){

const u = document.getElementById("ulica");
const d = document.getElementById("dzial");

// ulice
u.innerHTML = `<option value="">-- wybierz ulicę --</option>`;
Object.keys(baza).forEach(x=>{
u.innerHTML += `<option value="${x}">${x}</option>`;
});

// działy
d.innerHTML = `<option value="">-- dział --</option>`;
Object.keys(katalog).forEach(x=>{
d.innerHTML += `<option value="${x}">${x}</option>`;
});

// eventy
u.addEventListener("change", budynkiUpdate);
d.addEventListener("change", typyUpdate);

document.getElementById("wykonawca").addEventListener("change", function(){
document.getElementById("wykonawca_inne").classList.toggle("hidden", this.value !== "Inne");
});

});

// 🔧 FUNKCJE
function budynkiUpdate(){
const u = document.getElementById("ulica").value;
const b = document.getElementById("budynek");

b.innerHTML = `<option value="">-- wybierz budynek --</option>`;
if(!baza[u]) return;

baza[u].forEach(x=>{
b.innerHTML += `<option value="${x}">${x}</option>`;
});
}

function typyUpdate(){
const d = document.getElementById("dzial").value;
const t = document.getElementById("typ");

t.innerHTML = `<option value="">-- typ zgłoszenia --</option>`;
if(!katalog[d]) return;

katalog[d].forEach(x=>{
t.innerHTML += `<option value="${x}">${x}</option>`;
});
}

// 🔥 DODAJ
function dodaj(){

const ulica = document.getElementById("ulica").value;
const budynek = document.getElementById("budynek").value;
const lokal = document.getElementById("lokal").value;
const dzial = document.getElementById("dzial").value;
const typ = document.getElementById("typ").value;
const opis = document.getElementById("opis").value;

const wykonSel = document.getElementById("wykonawca").value;
const wykonawca = wykonSel==="Inne"
? document.getElementById("wykonawca_inne").value
: wykonSel;

const data = document.getElementById("data_zgl").value
? new Date(document.getElementById("data_zgl").value)
: new Date();

let reader = new FileReader();

reader.onload = function(){

lista.push({
id:"ZL-"+id++,
adres:`${ulica} ${budynek}/${lokal}`,
dzial,
typ,
opis,
wykonawca,
status:"Nowe",
data,
reakcja:null,
realizacja:null,
foto: reader.result || ""
});

render();
};

if(document.getElementById("foto").files[0]){
reader.readAsDataURL(document.getElementById("foto").files[0]);
}else reader.onload();
}

// 🔥 STATUS
function akcja(i){
let t = lista[i];

if(t.status==="Nowe"){
t.status="W trakcie";
t.reakcja=new Date()-new Date(t.data);
}else{
t.status="Zakończone";
t.realizacja=new Date()-(new Date(t.data).getTime()+t.reakcja);
}

render();
}

// 🔥 PDF
function pdf(i){

let z = lista[i];

let w = window.open("", "", "width=600,height=700");

w.document.write(`
<h2>KARTA WYKONANIA USŁUGI</h2>
<hr>
<b>ID:</b> ${z.id}<br>
<b>Adres:</b> ${z.adres}<br>
<b>Dział:</b> ${z.dzial}<br>
<b>Typ:</b> ${z.typ}<br>
<b>Opis:</b> ${z.opis}<br>
<b>Wykonawca:</b> ${z.wykonawca}<br>
<b>Data zgłoszenia:</b> ${new Date(z.data).toLocaleString()}<br><br>

<b>Uwagi wykonawcy:</b><br>
<br><br><br>

_________________________<br>
Podpis wykonawcy
`);

w.print();
}

// 🔥 CZAS
function czas(ms){
let h=Math.floor(ms/3600000);
let m=Math.floor((ms%3600000)/60000);
return h+" h "+m+" min";
}

// 🔥 RENDER
function render(){

const tabela = document.getElementById("tabela");
tabela.innerHTML="";

lista.forEach((t,i)=>{

let img = t.foto ? `<img src="${t.foto}" onclick="window.open('${t.foto}')">` : "-";

tabela.innerHTML+=`
<tr>
<td>${t.id}</td>
<td>${t.adres}</td>
<td>${t.dzial}</td>
<td>${t.typ}</td>
<td>${img}</td>
<td>${t.wykonawca}</td>
<td>${t.status}</td>
<td>${new Date(t.data).toLocaleString()}</td>
<td>${t.reakcja?czas(t.reakcja):"-"}</td>
<td>${t.realizacja?czas(t.realizacja):"-"}</td>
<td>
<button onclick="akcja(${i})">▶</button>
<button onclick="pdf(${i})">🧾</button>
</td>
</tr>`;
});

raporty();
}

// 🔥 RAPORTY
function raporty(){
document.getElementById("r_total").innerText = lista.length;
document.getElementById("r_new").innerText = lista.filter(x=>x.status==="Nowe").length;
document.getElementById("r_prog").innerText = lista.filter(x=>x.status==="W trakcie").length;
document.getElementById("r_done").innerText = lista.filter(x=>x.status==="Zakończone").length;
}

</script>

</body>
</html>
