<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>SYSTEM ADMINISTRATORA FINAL PRO MAX+</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:white; padding:20px; border-radius:10px; }

input, select, textarea { width:100%; padding:8px; margin-bottom:10px; }

button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; }
.btn { background:#007bff; color:white; }

table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ddd; padding:6px; font-size:13px; text-align:center; }

img { max-width:60px; cursor:pointer; }
.hidden { display:none; }

#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#f4f6f8;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div style="background:white;padding:30px;border-radius:10px;text-align:center;">
<h2>🔐 Panel Administratora</h2>
<input type="password" id="haslo">
<br><br>
<button onclick="login()">Zaloguj</button>
</div>
</div>

<div class="container">

<h1>📊 SYSTEM ADMINISTRATORA FINAL PRO MAX+</h1>

<h3>➕ Nowe zgłoszenie</h3>

<label>Ulica</label>
<select id="ulica"></select>

<label>Budynek</label>
<select id="budynek"></select>

<label>Lokal</label>
<input id="lokal">

<label>Dział</label>
<select id="dzial"></select>

<label>Typ zgłoszenia</label>
<select id="typ"></select>

<label>Opis</label>
<textarea id="opis"></textarea>

<label>Wykonawca</label>
<select id="wykonawca" onchange="toggleInne()">
<option>Konserwator 1</option>
<option>Konserwator 2</option>
<option>Konserwator 3</option>
<option>Inne</option>
</select>

<input id="wykonawca_inne" class="hidden" placeholder="Wpisz wykonawcę">

<label>Data zgłoszenia</label>
<input type="datetime-local" id="data_zgl">

<label>Zdjęcie</label>
<input type="file" id="foto">

<button class="btn" onclick="dodaj()">Dodaj</button>

<table>
<thead>
<tr>
<th>ID</th><th>Adres</th><th>Dział</th><th>Typ</th>
<th>Zdjęcie</th><th>Wykonawca</th><th>Status</th>
<th>Data zgł.</th><th>Przekazanie</th><th>Zakończenie</th>
<th>Reakcja</th><th>Realizacja</th><th>Akcja</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<h2>🔥 Najczęstsze zgłoszenia (TOP 10)</h2>
<ul id="top10"></ul>

</div>

<script>

// LOGIN
function login(){
if(document.getElementById("haslo").value==="admin123"){
document.getElementById("loginBox").style.display="none";
}else alert("Błędne hasło");
}

// BAZA
const baza = {
"Góralska":["5","7","9","11","37","39","41","43","51","53","55","57","59","61","63","65","67","69","71"],
"Leśna Góra":["5","8","23","25","27","29"],
"Mazowiecka":["3","5","7"],
"Trawki":["9","11","13","15","17"],
"Reymonta":["17","34"],
"Słowackiego":["36A","40A","47/49/51","59","61"],
"Róży Ostrowskiej":["2","4"],
"Leśny Stok":["4"],
"Partyzantów":["91/93","95/97","99","101","103","105","107","109","27"],
"Wojska Polskiego":["7"],
"Batorego":["33","34","35","37","39"],
"De Gaulle’a":["8"],
"Zamenhofa":["18"],
"Grunwaldzka":["92/98","116","121"],
"Biała":["3","6"],
"Chrobrego":["10","12","14","18/20"],
"Danusi":["4A"],
"Lelewela":["17","17A","21/22"],
"Lilli Wenedy":["18A","B","D","E","F"],
"Mickiewicza":["1/3","18"],
"Wyspiańskiego":["25","38/40"]
};

// KATALOG
const katalog = {
"gazowe": [
"awaria piecyka",
"nieszczelność instalacji gazowej",
"zapach gazu",
"brak gazu",
"przegląd instalacji gazowej",
"nieszczelny zawór gazowy",
"problem z wentylacją",
"brak ciągu kominowego",
"czujnik gazu – alarm",
"inne - patrz opis"
],

"elektryczne": [
"brak prądu w lokalu",
"brak prądu w budynku",
"zwarcie instalacji",
"awaria oświetlenia klatki",
"uszkodzone gniazdko",
"awaria licznika energii",
"problem z instalacją elektryczną",
"awaria domofonu",
"bezpieczniki / rozdzielnia",
"inne - patrz opis"
],

"wodne": [
"wyciek wody",
"zalanie lokalu",
"awaria pionu wodnego",
"problem z kanalizacją",
"zatkany odpływ",
"niskie ciśnienie wody",
"awaria licznika wody",
"nieszczelny zawór",
"cofka kanalizacji",
"inne - patrz opis"
],

"porządkowe": [
"sprzątanie klatki schodowej",
"zalegające śmieci",
"odpady wielkogabarytowe",
"brak porządku wokół budynku",
"liście / zanieczyszczenia",
"śnieg / oblodzenie",
"piasek po zimie",
"zanieczyszczone miejsca wspólne",
"dezynfekcja powierzchni",
"inne - patrz opis"
],

"inne": [
"inne - patrz opis"
]
};

let lista = JSON.parse(localStorage.getItem("SYS")) || [];
let licznik = lista.length + 1;

function init(){

document.getElementById("ulica").innerHTML =
Object.keys(baza).map(u=>`<option>${u}</option>`).join("");

document.getElementById("dzial").innerHTML =
Object.keys(katalog).map(d=>`<option>${d}</option>`).join("");

// 🔥 wymuszenie reakcji na zmianę
document.getElementById("dzial").addEventListener("change", typyUpdate);
document.getElementById("ulica").addEventListener("change", budynkiUpdate);

budynkiUpdate();
typyUpdate();
render();
}

function budynkiUpdate(){
budynek.innerHTML = baza[ulica.value].map(b=>`<option>${b}</option>`).join("");
}

function typyUpdate(){

let dzialVal = document.getElementById("dzial").value;
let typSelect = document.getElementById("typ");

// 🔥 czyścimy stare opcje
typSelect.innerHTML = "";

if(!katalog[dzialVal]) return;

katalog[dzialVal].forEach(t=>{
typSelect.innerHTML += `<option>${t}</option>`;
});

}

let dzialSelect = document.getElementById("dzial");
let typSelect = document.getElementById("typ");

let wybrany = dzialSelect.value;

if(!katalog[wybrany]) return;

typSelect.innerHTML = katalog[wybrany]
.map(t=>`<option>${t}</option>`)
.join("");
}

function toggleInne(){
wykonawca_inne.classList.toggle("hidden", wykonawca.value!=="Inne");
}

function save(){
localStorage.setItem("SYS", JSON.stringify(lista));
}

function dodaj(){

let wykon = wykonawca.value==="Inne" ? wykonawca_inne.value : wykonawca.value;
let data = data_zgl.value ? new Date(data_zgl.value) : new Date();

let reader = new FileReader();

reader.onload = function(){

lista.push({
id:"ZL-"+(licznik++),
adres:`${document.getElementById("ulica").value} ${document.getElementById("budynek").value}/${document.getElementById("lokal").value}`,
dzial: document.getElementById("dzial").value,
typ: document.getElementById("typ").value,
wykonawca: wykon,
opis: document.getElementById("opis").value,
foto:reader.result || "",
status:"Nowe",
data_zgl:data,
data_przek:"",
data_koniec:""
});

save();
render();
};

if(foto.files[0]) reader.readAsDataURL(foto.files[0]);
else reader.onload();
}

function diff(a,b){
let ms = new Date(b)-new Date(a);
let h=Math.floor(ms/3600000);
let m=Math.floor((ms%3600000)/60000);
return h+" h "+m+" min";
}

function start(i){
lista[i].status="W trakcie";
lista[i].data_przek=new Date();
save(); render();
}

function done(i){
lista[i].status="Zrealizowane";
lista[i].data_koniec=new Date();
save(); render();
}

function pdf(i){
let z=lista[i];

let w=window.open("","","width=600,height=700");

w.document.write(`
<h2>KARTA PRACY</h2>
<hr>
<b>ID:</b> ${z.id}<br>
<b>Adres:</b> ${z.adres}<br>
<b>Dział:</b> ${z.dzial}<br>
<b>Typ:</b> ${z.typ}<br>
<b>Opis:</b> ${z.opis}<br>
<b>Wykonawca:</b> ${z.wykonawca}<br>
<br><br>
<b>Uwagi:</b><br><br><br>
____________________
`);

w.print();
}

function generujTop10(){
let stat={};

lista.forEach(z=>{
if(!stat[z.typ]) stat[z.typ]=0;
stat[z.typ]++;
});

let wynik=Object.entries(stat).sort((a,b)=>b[1]-a[1]).slice(0,10);

let ul=document.getElementById("top10");
ul.innerHTML="";

wynik.forEach(([t,l])=>{
ul.innerHTML+=`<li>${t} — ${l}</li>`;
});
}

function render(){

tabela.innerHTML="";

lista.forEach((z,i)=>{

let reakcja = z.data_przek ? diff(z.data_zgl,z.data_przek) : "-";
let realizacja = z.data_koniec ? diff(z.data_przek,z.data_koniec) : "-";

let img = z.foto ? `<img src="${z.foto}" onclick="window.open('${z.foto}')">` : "-";

let akcja="";
if(z.status==="Nowe") akcja += `<button onclick="start(${i})">▶</button>`;
if(z.status==="W trakcie") akcja += `<button onclick="done(${i})">✔</button>`;
akcja += `<button onclick="pdf(${i})">🧾</button>`;

tabela.innerHTML+=`
<tr>
<td>${z.id}</td>
<td>${z.adres}</td>
<td>${z.dzial}</td>
<td>${z.typ}</td>
<td>${img}</td>
<td>${z.wykonawca}</td>
<td>${z.status}</td>
<td>${new Date(z.data_zgl).toLocaleString()}</td>
<td>${z.data_przek?new Date(z.data_przek).toLocaleString():"-"}</td>
<td>${z.data_koniec?new Date(z.data_koniec).toLocaleString():"-"}</td>
<td>${reakcja}</td>
<td>${realizacja}</td>
<td>${akcja}</td>
</tr>`;
});

generujTop10();
}

</script>

</body>
</html>
