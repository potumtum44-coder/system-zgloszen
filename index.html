<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>SYSTEM ADMINISTRATORA FINAL PRO MAX+</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:#fff; padding:25px; border-radius:12px; max-width:1200px; margin:auto; }
.form-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; }
input, select { padding:8px; border:1px solid #ccc; border-radius:6px; }
button { padding:10px; background:#007bff; color:white; border:none; border-radius:6px; cursor:pointer; }
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#eee; }
#raporty { margin-top:30px; background:#fafafa; padding:15px; border-radius:10px; }
</style>
</head>

<body>
<div class="container">

<h1>📊 SYSTEM ADMINISTRATORA FINAL PRO MAX+</h1>

<h2>➕ Nowe zgłoszenie</h2>

<div class="form-grid">

<select id="ulica" onchange="ladujBudynki()">
<option value="">-- wybierz ulicę --</option>
</select>

<select id="budynek">
<option value="">-- wybierz budynek --</option>
</select>

<input id="lokal" placeholder="Lokal">

<select id="dzial" onchange="ladujTypy()">
<option value="">-- dział --</option>
</select>

<select id="typ">
<option value="">-- typ zgłoszenia --</option>
</select>

<input id="wykonawca" placeholder="Wykonawca">

</div>

<button onclick="dodaj()">Dodaj zgłoszenie</button>

<table>
<thead>
<tr>
<th>ID</th><th>Adres</th><th>Dział</th><th>Typ</th>
<th>Wykonawca</th><th>Status</th>
<th>Data</th><th>Reakcja</th><th>Realizacja</th><th>Akcja</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div id="raporty">
<h2>📊 RAPORTY</h2>
<p>Wszystkie: <span id="r_total">0</span></p>
<p>Nowe: <span id="r_new">0</span></p>
<p>W trakcie: <span id="r_prog">0</span></p>
<p>Zakończone: <span id="r_done">0</span></p>
<p>Śr. reakcja: <span id="r_react">0</span> h</p>
<p>Śr. realizacja: <span id="r_real">0</span> h</p>
<ul id="r_issues"></ul>
<ul id="r_buildings"></ul>
</div>

</div>

<script>

// 🔥 DANE
const dane = {
  "Góralska": ["5","7","9","11"],
  "Leśna Góra": ["5","8","23","25","27","29"],
  "Mazowiecka": ["3","5","7"],
  "Trawki": ["9","11","13","15","17"]
};

const typy = {
  "elektryczne": ["zwarcie instalacji","brak prądu"],
  "wodne": ["wyciek wody","awaria pionu"],
  "gazowe": ["awaria piecyka"],
  "porządkowe": ["śmieci","sprzątanie"]
};

// 🔥 INICJALIZACJA
window.onload = function(){

  // ulice
  const u = document.getElementById("ulica");
  Object.keys(dane).forEach(x=>{
    u.innerHTML += `<option>${x}</option>`;
  });

  // działy
  const d = document.getElementById("dzial");
  Object.keys(typy).forEach(x=>{
    d.innerHTML += `<option>${x}</option>`;
  });

  render();
};

// 🔥 budynki
function ladujBudynki(){
  const u = document.getElementById("ulica").value;
  const b = document.getElementById("budynek");
  b.innerHTML = `<option value="">-- wybierz budynek --</option>`;

  if(!dane[u]) return;

  dane[u].forEach(x=>{
    b.innerHTML += `<option>${x}</option>`;
  });
}

// 🔥 typy
function ladujTypy(){
  const d = document.getElementById("dzial").value;
  const t = document.getElementById("typ");
  t.innerHTML = `<option value="">-- typ zgłoszenia --</option>`;

  if(!typy[d]) return;

  typy[d].forEach(x=>{
    t.innerHTML += `<option>${x}</option>`;
  });
}

// 🔥 SYSTEM
let lista = JSON.parse(localStorage.getItem("zgloszenia")) || [];
let id = lista.length + 1;

function zapisz(){
  localStorage.setItem("zgloszenia", JSON.stringify(lista));
}

function czas(ms){
  let h = Math.floor(ms/3600000);
  let m = Math.floor((ms%3600000)/60000);
  return h+" h "+m+" min";
}

function dodaj(){

  let ulica = document.getElementById("ulica").value;
  let bud = document.getElementById("budynek").value;
  let lok = document.getElementById("lokal").value;
  let dzial = document.getElementById("dzial").value;
  let typ = document.getElementById("typ").value;

  if(!ulica || !bud || !dzial || !typ){
    alert("Uzupełnij pola!");
    return;
  }

  lista.push({
    id:"ZL-"+id++,
    adres: ulica+" "+bud+"/"+lok,
    dzial:dzial,
    typ:typ,
    wykonawca: document.getElementById("wykonawca").value || "-",
    status:"Nowe",
    data:new Date(),
    reakcja:null,
    realizacja:null
  });

  zapisz();
  render();
}

function akcja(i){
  let t = lista[i];

  if(t.status==="Nowe"){
    t.status="W trakcie";
    t.reakcja = new Date() - new Date(t.data);
  }else{
    t.status="Zakończone";
    t.realizacja = new Date() - (new Date(t.data).getTime()+t.reakcja);
  }

  zapisz();
  render();
}

function render(){

  let tb = document.getElementById("tbody");
  tb.innerHTML="";

  lista.forEach((t,i)=>{
    tb.innerHTML += `
    <tr>
    <td>${t.id}</td>
    <td>${t.adres}</td>
    <td>${t.dzial}</td>
    <td>${t.typ}</td>
    <td>${t.wykonawca}</td>
    <td>${t.status}</td>
    <td>${new Date(t.data).toLocaleString()}</td>
    <td>${t.reakcja?czas(t.reakcja):"-"}</td>
    <td>${t.realizacja?czas(t.realizacja):"-"}</td>
    <td><button onclick="akcja(${i})">▶</button></td>
    </tr>`;
  });

  raporty();
}

function raporty(){

  document.getElementById("r_total").innerText = lista.length;
  document.getElementById("r_new").innerText = lista.filter(x=>x.status==="Nowe").length;
  document.getElementById("r_prog").innerText = lista.filter(x=>x.status==="W trakcie").length;
  document.getElementById("r_done").innerText = lista.filter(x=>x.status==="Zakończone").length;

  let issues = {};
  lista.forEach(x=>issues[x.typ]=(issues[x.typ]||0)+1);

  let ul = document.getElementById("r_issues");
  ul.innerHTML="";
  Object.entries(issues).forEach(([k,v])=>{
    ul.innerHTML+=`<li>${k} - ${v}</li>`;
  });

  let bud = {};
  lista.forEach(x=>bud[x.adres]=(bud[x.adres]||0)+1);

  let ul2 = document.getElementById("r_buildings");
  ul2.innerHTML="";
  Object.entries(bud).forEach(([k,v])=>{
    ul2.innerHTML+=`<li>${k} - ${v}</li>`;
  });
}

</script>

</body>
</html>
