<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>SYSTEM ADMINISTRATORA FINAL PRO MAX+</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
h1 { color:#333; }

.container { background:#fff; padding:20px; border-radius:10px; }

input, select { padding:6px; margin:5px 0; width:100%; }

button {
  padding:8px 12px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:20px;
}

th, td {
  border:1px solid #ddd;
  padding:6px;
  font-size:13px;
}

th { background:#eee; }
</style>
</head>

<body>

<div class="container">

<h1>📊 SYSTEM ADMINISTRATORA FINAL PRO MAX+</h1>

<h2>➕ Nowe zgłoszenie</h2>

<input id="ulica" placeholder="Ulica">
<input id="budynek" placeholder="Budynek">
<input id="lokal" placeholder="Lokal">

<select id="dzial">
<option>elektryczne</option>
<option>wodne</option>
<option>gazowe</option>
<option>porządkowe</option>
</select>

<input id="typ" placeholder="Typ zgłoszenia">
<input id="wykonawca" placeholder="Wykonawca">

<button onclick="dodaj()">Dodaj zgłoszenie</button>

<table id="tabela">
<thead>
<tr>
<th>ID</th><th>Adres</th><th>Dział</th><th>Typ</th>
<th>Wykonawca</th><th>Status</th>
<th>Data zgł.</th><th>Reakcja</th><th>Realizacja</th>
<th>Akcja</th>
</tr>
</thead>
<tbody></tbody>
</table>

<hr>

<h2>📊 RAPORTY</h2>

<p>Wszystkie: <span id="r_total">0</span></p>
<p>Nowe: <span id="r_new">0</span></p>
<p>W trakcie: <span id="r_prog">0</span></p>
<p>Zakończone: <span id="r_done">0</span></p>

<p>Śr. reakcja: <span id="r_react">0</span> h</p>
<p>Śr. realizacja: <span id="r_real">0</span> h</p>

<h3>🔥 Najczęstsze</h3>
<ul id="r_issues"></ul>

<h3>🏢 Budynki</h3>
<ul id="r_buildings"></ul>

</div>

<script>
let lista = [];
let id = 1;

function czas(ms){
  let h = Math.floor(ms/3600000);
  let m = Math.floor((ms%3600000)/60000);
  return h + " h " + m + " min";
}

function dodaj(){
  let teraz = new Date();

  let obj = {
    id: "ZL-" + id++,
    adres: document.getElementById("ulica").value + " " +
           document.getElementById("budynek").value + "/" +
           document.getElementById("lokal").value,
    dzial: document.getElementById("dzial").value,
    typ: document.getElementById("typ").value,
    wykonawca: document.getElementById("wykonawca").value,
    status: "Nowe",
    data: teraz,
    reakcja: null,
    realizacja: null
  };

  lista.push(obj);
  render();
}

function akcja(i){
  let t = lista[i];

  if(t.status === "Nowe"){
    t.status = "W trakcie";
    t.reakcja = new Date() - t.data;
  }
  else if(t.status === "W trakcie"){
    t.status = "Zakończone";
    t.realizacja = new Date() - (t.data + t.reakcja);
  }

  render();
}

function render(){
  let tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  lista.forEach((t,i)=>{
    tbody.innerHTML += `
    <tr>
      <td>${t.id}</td>
      <td>${t.adres}</td>
      <td>${t.dzial}</td>
      <td>${t.typ}</td>
      <td>${t.wykonawca}</td>
      <td>${t.status}</td>
      <td>${t.data.toLocaleString()}</td>
      <td>${t.reakcja ? czas(t.reakcja) : "-"}</td>
      <td>${t.realizacja ? czas(t.realizacja) : "-"}</td>
      <td><button onclick="akcja(${i})">▶</button></td>
    </tr>`;
  });

  raporty();
}

function raporty(){

  let total = lista.length;
  let nowe = lista.filter(x=>x.status==="Nowe").length;
  let prog = lista.filter(x=>x.status==="W trakcie").length;
  let done = lista.filter(x=>x.status==="Zakończone").length;

  let reakcje = lista.map(x=>x.reakcja).filter(x=>x);
  let realizacje = lista.map(x=>x.realizacja).filter(x=>x);

  let avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length/3600000).toFixed(1) : 0;

  document.getElementById("r_total").innerText = total;
  document.getElementById("r_new").innerText = nowe;
  document.getElementById("r_prog").innerText = prog;
  document.getElementById("r_done").innerText = done;

  document.getElementById("r_react").innerText = avg(reakcje);
  document.getElementById("r_real").innerText = avg(realizacje);

  // TOP
  let issues = {};
  lista.forEach(x=>issues[x.typ]=(issues[x.typ]||0)+1);

  let ul = document.getElementById("r_issues");
  ul.innerHTML="";
  Object.entries(issues).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    ul.innerHTML+=`<li>${k} - ${v}</li>`;
  });

  let bud = {};
  lista.forEach(x=>bud[x.adres]=(bud[x.adres]||0)+1);

  let ul2 = document.getElementById("r_buildings");
  ul2.innerHTML="";
  Object.entries(bud).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    ul2.innerHTML+=`<li>${k} - ${v}</li>`;
  });
}
</script>

</body>
</html>
