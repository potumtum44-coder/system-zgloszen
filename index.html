<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>SYSTEM ADMINISTRATORA FINAL PRO MAX+</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:white; padding:20px; border-radius:10px; max-width:1200px; margin:auto; }

input, select, textarea { width:100%; padding:8px; margin-bottom:10px; }

button { padding:8px; background:#007bff; color:white; border:none; border-radius:6px; cursor:pointer; }

table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ddd; padding:6px; font-size:13px; text-align:center; }

img { max-width:60px; cursor:pointer; }

.hidden { display:none; }

#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#f4f6f8;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="loginBox">
<div style="background:white;padding:30px;border-radius:10px;text-align:center;">
<h2>🔐 Panel Administratora</h2>
<input type="password" id="haslo" placeholder="admin123">
<br><br>
<button onclick="login()">Zaloguj</button>
</div>
</div>

<div class="container">

<h1>📊 SYSTEM ADMINISTRATORA FINAL PRO MAX+</h1>

<h3>➕ Nowe zgłoszenie</h3>

<label>Ulica</label>
<select id="ulica"></select>

<label>Budynek</label>
<select id="budynek"></select>

<label>Lokal</label>
<input id="lokal">

<label>Dział</label>
<select id="dzial"></select>

<label>Typ zgłoszenia</label>
<select id="typ"></select>

<label>Opis</label>
<textarea id="opis"></textarea>

<label>Wykonawca</label>
<select id="wykonawca">
<option>Konserwator 1</option>
<option>Konserwator 2</option>
<option>Konserwator 3</option>
<option>Inne</option>
</select>

<input id="wykonawca_inne" class="hidden" placeholder="Wpisz wykonawcę">

<label>Data zgłoszenia</label>
<input type="datetime-local" id="data_zgl">

<label>Zdjęcie</label>
<input type="file" id="foto">

<button onclick="dodaj()">Dodaj zgłoszenie</button>

<table>
<thead>
<tr>
<th>ID</th><th>Adres</th><th>Dział</th><th>Typ</th>
<th>Zdjęcie</th>
<th>Wykonawca</th><th>Status</th>
<th>Data</th><th>Reakcja</th><th>Realizacja</th><th>Akcja</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<hr>

<h2>📊 RAPORTY</h2>
<p>Wszystkie: <span id="r_total">0</span></p>
<p>Nowe: <span id="r_new">0</span></p>
<p>W trakcie: <span id="r_prog">0</span></p>
<p>Zakończone: <span id="r_done">0</span></p>

</div>

<script>

// 🔐 LOGIN
function login(){
if(haslo.value.trim()==="admin123"){
loginBox.style.display="none";
}else alert("Błędne hasło");
}

// 🔥 TWOJA BAZA (pełna)
const baza = {
"Góralska":["5","7","9","11","37","39","41","43","51","53","55","57","59","61","63","65","67","69","71"],
"Leśna Góra":["5","8","23","25","27","29"],
"Mazowiecka":["3","5","7"],
"Trawki":["9","11","13","15","17"],
"Reymonta":["17","34"],
"Słowackiego":["36A","40A","47/49/51","59","61"],
"Róży Ostrowskiej":["2","4"],
"Leśny Stok":["4"],
"Partyzantów":["91/93","95/97","99","101","103","105","107","109","27"],
"Wojska Polskiego":["7"],
"Batorego":["33","34","35","37","39"],
"De Gaulle’a":["8"],
"Zamenhofa":["18"],
"Grunwaldzka":["92/98","116","121"],
"Biała":["3","6"],
"Chrobrego":["10","12","14","18/20"],
"Danusi":["4A"],
"Lelewela":["17","17A","21/22"],
"Lilli Wenedy":["18A","B","D","E","F"],
"Mickiewicza":["1/3","18"],
"Wyspiańskiego":["25","38/40"]
};

// 🔥 KATALOG
const katalog = {
"gazowe":["awaria piecyka","nieszczelność instalacji gazowej","zapach gazu","brak gazu","inne - patrz opis"],
"elektryczne":["brak prądu","zwarcie instalacji","awaria oświetlenia","inne - patrz opis"],
"wodne":["wyciek wody","zalanie lokalu","awaria pionu","inne - patrz opis"],
"porządkowe":["śmieci","sprzątanie","inne - patrz opis"],
"inne":["inne - patrz opis"]
};

let lista = JSON.parse(localStorage.getItem("SYS")) || [];
let id = lista.length + 1;

window.onload = function(){

ulica.innerHTML = `<option>-- wybierz ulicę --</option>`;
Object.keys(baza).forEach(x=>ulica.innerHTML+=`<option>${x}</option>`);

dzial.innerHTML = `<option>-- dział --</option>`;
Object.keys(katalog).forEach(x=>dzial.innerHTML+=`<option>${x}</option>`);

ulica.onchange = budynkiUpdate;
dzial.onchange = typyUpdate;

wykonawca.onchange = () =>
wykonawca_inne.classList.toggle("hidden", wykonawca.value !== "Inne");

render();
};

function budynkiUpdate(){
budynek.innerHTML = `<option>-- wybierz budynek --</option>`;
if(!baza[ulica.value]) return;
baza[ulica.value].forEach(x=>budynek.innerHTML+=`<option>${x}</option>`);
}

function typyUpdate(){
typ.innerHTML = `<option>-- typ zgłoszenia --</option>`;
if(!katalog[dzial.value]) return;
katalog[dzial.value].forEach(x=>typ.innerHTML+=`<option>${x}</option>`);
}

function dodaj(){

let wykon = wykonawca.value==="Inne" ? wykonawca_inne.value : wykonawca.value;
let data = data_zgl.value ? new Date(data_zgl.value) : new Date();

let reader = new FileReader();

reader.onload = function(){

lista.push({
id:"ZL-"+id++,
adres:`${ulica.value} ${budynek.value}/${lokal.value}`,
dzial:dzial.value,
typ:typ.value,
wykonawca:wykon,
status:"Nowe",
data,
reakcja:null,
realizacja:null,
foto: reader.result || "",
opis: opis.value
});

save();
render();
};

if(foto.files[0]) reader.readAsDataURL(foto.files[0]);
else reader.onload();
}

function save(){
localStorage.setItem("SYS", JSON.stringify(lista));
}

function akcja(i){
let t = lista[i];

if(t.status==="Nowe"){
t.status="W trakcie";
t.reakcja = new Date() - new Date(t.data);
}else{
t.status="Zakończone";
t.realizacja = new Date() - (new Date(t.data).getTime()+t.reakcja);
}

save();
render();
}

function pdf(i){
let z = lista[i];

let w = window.open("", "", "width=600,height=700");

w.document.write(`
<h2>KARTA WYKONANIA USŁUGI</h2>
<hr>
<b>ID:</b> ${z.id}<br>
<b>Adres:</b> ${z.adres}<br>
<b>Dział:</b> ${z.dzial}<br>
<b>Typ:</b> ${z.typ}<br>
<b>Opis:</b> ${z.opis}<br>
<b>Wykonawca:</b> ${z.wykonawca}<br>
<b>Data:</b> ${new Date(z.data).toLocaleString()}<br><br>
_________________________<br>
Podpis wykonawcy
`);

w.print();
}

function czas(ms){
let h=Math.floor(ms/3600000);
let m=Math.floor((ms%3600000)/60000);
return h+" h "+m+" min";
}

function render(){

tabela.innerHTML="";

lista.forEach((t,i)=>{

let img = t.foto ? `<img src="${t.foto}" onclick="window.open('${t.foto}')">` : "-";

tabela.innerHTML+=`
<tr>
<td>${t.id}</td>
<td>${t.adres}</td>
<td>${t.dzial}</td>
<td>${t.typ}</td>
<td>${img}</td>
<td>${t.wykonawca}</td>
<td>${t.status}</td>
<td>${new Date(t.data).toLocaleString()}</td>
<td>${t.reakcja?czas(t.reakcja):"-"}</td>
<td>${t.realizacja?czas(t.realizacja):"-"}</td>
<td>
<button onclick="akcja(${i})">▶</button>
<button onclick="pdf(${i})">🧾</button>
</td>
</tr>`;
});

raporty();
}

function raporty(){
r_total.innerText=lista.length;
r_new.innerText=lista.filter(x=>x.status==="Nowe").length;
r_prog.innerText=lista.filter(x=>x.status==="W trakcie").length;
r_done.innerText=lista.filter(x=>x.status==="Zakończone").length;
}

</script>

</body>
</html>
