<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>System Administratora FINAL PRO MAX+</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:white; padding:20px; border-radius:10px; }

input, select, textarea { width:100%; padding:8px; margin-bottom:10px; }

button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; }
.btn { background:#007bff; color:white; }

table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ddd; padding:6px; font-size:13px; }

img { max-width:60px; cursor:pointer; }
.hidden { display:none; }

#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#f4f6f8;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="loginBox">
<div style="background:white;padding:30px;border-radius:10px;text-align:center;">
<h2>🔐 Panel Administratora</h2>
<input type="password" id="haslo">
<br><br>
<button onclick="login()">Zaloguj</button>
</div>
</div>

<div class="container">

<h1>📊 SYSTEM ADMINISTRATORA FINAL PRO MAX+</h1>

<h3>➕ Nowe zgłoszenie</h3>

<label>Ulica</label>
<select id="ulica"></select>

<label>Budynek</label>
<select id="budynek"></select>

<label>Lokal</label>
<input id="lokal">

<label>Dział</label>
<select id="dzial"></select>

<label>Typ zgłoszenia</label>
<select id="typ"></select>

<label>Opis / kontakt</label>
<textarea id="opis"></textarea>

<label>Wykonawca</label>
<select id="wykonawca" onchange="toggleInne()">
<option>Konserwator 1</option>
<option>Konserwator 2</option>
<option>Konserwator 3</option>
<option>Inne</option>
</select>

<input id="wykonawca_inne" class="hidden" placeholder="Wpisz wykonawcę">

<label>Data zgłoszenia</label>
<input type="datetime-local" id="data_zgl">

<label>Zdjęcie</label>
<input type="file" id="foto">

<button class="btn" onclick="dodaj()">Dodaj</button>

<table>
<thead>
<tr>
<th>ID</th><th>Adres</th><th>Dział</th><th>Typ</th>
<th>Zdjęcie</th><th>Wykonawca</th><th>Status</th>
<th>Data</th><th>Reakcja</th><th>Realizacja</th><th>Akcja</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<h2>🔥 Najczęstsze zgłoszenia</h2>
<ul id="top10"></ul>

</div>

<script>

// LOGIN
function login(){
if(document.getElementById("haslo").value==="admin123"){
document.getElementById("loginBox").style.display="none";
}else alert("Błędne hasło");
}

// BAZA
const baza={
"Góralska":["5","7","9","11","37","39","41","43","51","53","55","57","59","61","63","65","67","69","71"],
"Leśna Góra":["5","8","23","25","27","29"],
"Mazowiecka":["3","5","7"],
"Trawki":["9","11","13","15","17"],
"Reymonta":["17","34"],
"Słowackiego":["36A","40A","47/49/51","59","61"],
"Róży Ostrowskiej":["2","4"],
"Leśny Stok":["4"],
"Partyzantów":["91/93","95/97","99","101","103","105","107","109","27"],
"Wojska Polskiego":["7"],
"Batorego":["33","34","35","37","39"],
"De Gaulle’a":["8"],
"Zamenhofa":["18"],
"Grunwaldzka":["92/98","116","121"],
"Biała":["3","6"],
"Chrobrego":["10","12","14","18/20"],
"Danusi":["4A"],
"Lelewela":["17","17A","21/22"],
"Lilli Wenedy":["18A","B","D","E","F"],
"Mickiewicza":["1/3","18"],
"Wyspiańskiego":["25","38/40"]
};

const katalog={
"gazowe":["awaria piecyka","nieszczelność instalacji gazowej","zapach gazu","brak gazu","przegląd instalacji gazowej","nieszczelny zawór gazowy","problem z wentylacją","brak ciągu kominowego","czujnik gazu – alarm","inne - patrz opis"],
"elektryczne":["brak prądu w lokalu","brak prądu w budynku","zwarcie instalacji","awaria oświetlenia klatki","uszkodzone gniazdko","awaria licznika energii","problem z instalacją elektryczną","awaria domofonu","bezpieczniki / rozdzielnia","inne - patrz opis"],
"wodne":["wyciek wody","zalanie lokalu","awaria pionu wodnego","problem z kanalizacją","zatkany odpływ","niskie ciśnienie wody","awaria licznika wody","nieszczelny zawór","cofka kanalizacji","inne - patrz opis"],
"porządkowe":["sprzątanie klatki","śmieci","odpady","brak porządku","liście","śnieg","piasek","zanieczyszczenia","dezynfekcja","inne - patrz opis"]
};

let lista=JSON.parse(localStorage.getItem("SYS"))||[];
let id=lista.length+1;

// INIT
function init(){

let u=document.getElementById("ulica");
let d=document.getElementById("dzial");

u.innerHTML=Object.keys(baza).map(x=>`<option>${x}</option>`).join("");
d.innerHTML=Object.keys(katalog).map(x=>`<option>${x}</option>`).join("");

u.addEventListener("change",budynkiUpdate);
d.addEventListener("change",typyUpdate);

budynkiUpdate();
typyUpdate();
render();
}

// FUNKCJE
function budynkiUpdate(){
let u=document.getElementById("ulica").value;
let b=document.getElementById("budynek");
b.innerHTML=baza[u].map(x=>`<option>${x}</option>`).join("");
}

function typyUpdate(){
let d=document.getElementById("dzial").value;
let t=document.getElementById("typ");
t.innerHTML=katalog[d].map(x=>`<option>${x}</option>`).join("");
}

function toggleInne(){
let w=document.getElementById("wykonawca").value;
document.getElementById("wykonawca_inne").classList.toggle("hidden",w!=="Inne");
}

function save(){
localStorage.setItem("SYS",JSON.stringify(lista));
}

function dodaj(){

let wykon=document.getElementById("wykonawca").value==="Inne"
?document.getElementById("wykonawca_inne").value
:document.getElementById("wykonawca").value;

let data=new Date();

lista.push({
id:"ZL-"+id++,
adres:`${ulica.value} ${budynek.value}/${lokal.value}`,
dzial:dzial.value,
typ:typ.value,
wykonawca:wykon,
status:"Nowe",
data:data,
przek:null,
koniec:null
});

save();
render();
}

function start(i){
lista[i].status="W trakcie";
lista[i].przek=new Date();
save(); render();
}

function done(i){
lista[i].status="Zrealizowane";
lista[i].koniec=new Date();
save(); render();
}

function czas(ms){
let h=Math.floor(ms/3600000);
let m=Math.floor((ms%3600000)/60000);
return h+" h "+m+" min";
}

function render(){

tabela.innerHTML="";

lista.forEach((z,i)=>{

let r=z.przek?czas(z.przek-z.data):"-";
let re=z.koniec?czas(z.koniec-z.przek):"-";

tabela.innerHTML+=`
<tr>
<td>${z.id}</td>
<td>${z.adres}</td>
<td>${z.dzial}</td>
<td>${z.typ}</td>
<td>-</td>
<td>${z.wykonawca}</td>
<td>${z.status}</td>
<td>${z.data.toLocaleString()}</td>
<td>${r}</td>
<td>${re}</td>
<td>
<button onclick="start(${i})">▶</button>
<button onclick="done(${i})">✔</button>
<button onclick="pdf(${i})">🧾</button>
</td>
</tr>`;
});

top10();
}

function top10(){
let stat={};
lista.forEach(z=>{
stat[z.typ]=(stat[z.typ]||0)+1;
});
let wynik=Object.entries(stat).sort((a,b)=>b[1]-a[1]).slice(0,10);

top10.innerHTML="";
wynik.forEach(x=>{
top10.innerHTML+=`<li>${x[0]} (${x[1]})</li>`;
});
}

function pdf(i){
let z=lista[i];
let w=window.open("");

w.document.write(`
<h2>KARTA PRACY</h2>
<b>ID:</b> ${z.id}<br>
<b>Adres:</b> ${z.adres}<br>
<b>Dział:</b> ${z.dzial}<br>
<b>Typ:</b> ${z.typ}<br>
<b>Wykonawca:</b> ${z.wykonawca}<br>
<br><br>
<b>Uwagi:</b><br><br><br><br>
______________________
`);

w.print();
}

init();

</script>

</body>
</html>
