<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>System Administratora FINAL PRO MAX+</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:white; padding:20px; border-radius:10px; }

input, select, textarea { width:100%; padding:8px; margin-bottom:10px; }

button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; }
.btn { background:#007bff; color:white; }

table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ddd; padding:6px; font-size:13px; }

#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#f4f6f8;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="loginBox">
<div style="background:white;padding:30px;border-radius:10px;text-align:center;">
<h2>🔐 Panel Administratora</h2>
<input type="password" id="haslo">
<br><br>
<button onclick="login()">Zaloguj</button>
</div>
</div>

<div class="container">

<h1>📊 SYSTEM ADMINISTRATORA FINAL PRO MAX+</h1>

<h3>➕ Nowe zgłoszenie</h3>

<label>Ulica</label>
<select id="ulica" onchange="budynkiUpdate()"></select>

<label>Budynek</label>
<select id="budynek"></select>

<label>Lokal</label>
<input id="lokal">

<label>Dział</label>
<select id="dzial" onchange="typyUpdate()"></select>

<label>Typ zgłoszenia</label>
<select id="typ"></select>

<label>Opis</label>
<textarea id="opis"></textarea>

<label>Wykonawca</label>
<select id="wykonawca">
<option>Konserwator 1</option>
<option>Konserwator 2</option>
<option>Konserwator 3</option>
</select>

<button class="btn" onclick="dodaj()">Dodaj</button>

<table>
<thead>
<tr>
<th>ID</th><th>Adres</th><th>Dział</th><th>Typ</th>
<th>Wykonawca</th><th>Status</th>
<th>Data</th><th>Reakcja</th><th>Realizacja</th><th>Akcja</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<hr>

<h2>📊 RAPORTY</h2>
<p>Wszystkie: <span id="r_total">0</span></p>
<p>Nowe: <span id="r_new">0</span></p>
<p>W trakcie: <span id="r_prog">0</span></p>
<p>Zakończone: <span id="r_done">0</span></p>

</div>

<script>

// 🔐 LOGOWANIE
function login(){
if(document.getElementById("haslo").value==="admin123"){
document.getElementById("loginBox").style.display="none";
}else alert("Błędne hasło");
}

// 🔥 DANE
const baza={
"Góralska":["5","7","9","11"],
"Leśna Góra":["5","8","23","25","27","29"],
"Mazowiecka":["3","5","7"],
"Trawki":["9","11","13","15","17"]
};

const katalog={
"elektryczne":["zwarcie instalacji","brak prądu"],
"wodne":["wyciek wody","awaria pionu"],
"gazowe":["awaria piecyka"],
"porządkowe":["śmieci","sprzątanie"]
};

// 🔥 START SYSTEMU (PEWNY)
document.addEventListener("DOMContentLoaded", function(){

// ULICE
const u = document.getElementById("ulica");
u.innerHTML = `<option value="">-- wybierz ulicę --</option>`;
Object.keys(baza).forEach(x=>{
u.innerHTML += `<option value="${x}">${x}</option>`;
});

// DZIAŁY
const d = document.getElementById("dzial");
d.innerHTML = `<option value="">-- dział --</option>`;
Object.keys(katalog).forEach(x=>{
d.innerHTML += `<option value="${x}">${x}</option>`;
});

render();
});

// 🔧 FUNKCJE
function budynkiUpdate(){
const b = document.getElementById("budynek");

if(!baza[ulica.value]){
b.innerHTML = `<option value="">-- wybierz budynek --</option>`;
return;
}

b.innerHTML = `<option value="">-- wybierz budynek --</option>`;
baza[ulica.value].forEach(x=>{
b.innerHTML += `<option value="${x}">${x}</option>`;
});
}

function typyUpdate(){
const t = document.getElementById("typ");

if(!katalog[dzial.value]){
t.innerHTML = `<option value="">-- typ zgłoszenia --</option>`;
return;
}

t.innerHTML = `<option value="">-- typ zgłoszenia --</option>`;
katalog[dzial.value].forEach(x=>{
t.innerHTML += `<option value="${x}">${x}</option>`;
});
}

// 🔥 SYSTEM
let lista=JSON.parse(localStorage.getItem("SYS"))||[];
let id=lista.length+1;

function save(){
localStorage.setItem("SYS",JSON.stringify(lista));
}

function dodaj(){

if(!ulica.value||!budynek.value||!dzial.value||!typ.value){
alert("Uzupełnij pola!");
return;
}

lista.push({
id:"ZL-"+id++,
adres:`${ulica.value} ${budynek.value}/${lokal.value}`,
dzial:dzial.value,
typ:typ.value,
wykonawca:wykonawca.value,
status:"Nowe",
data:new Date(),
reakcja:null,
realizacja:null
});

save();
render();
}

function akcja(i){
let t=lista[i];

if(t.status==="Nowe"){
t.status="W trakcie";
t.reakcja=new Date()-new Date(t.data);
}else{
t.status="Zakończone";
t.realizacja=new Date()-(new Date(t.data).getTime()+t.reakcja);
}

save();
render();
}

function czas(ms){
let h=Math.floor(ms/3600000);
let m=Math.floor((ms%3600000)/60000);
return h+" h "+m+" min";
}

function render(){

tabela.innerHTML="";

lista.forEach((t,i)=>{
tabela.innerHTML+=`
<tr>
<td>${t.id}</td>
<td>${t.adres}</td>
<td>${t.dzial}</td>
<td>${t.typ}</td>
<td>${t.wykonawca}</td>
<td>${t.status}</td>
<td>${new Date(t.data).toLocaleString()}</td>
<td>${t.reakcja?czas(t.reakcja):"-"}</td>
<td>${t.realizacja?czas(t.realizacja):"-"}</td>
<td><button onclick="akcja(${i})">▶</button></td>
</tr>`;
});

raporty();
}

// 📊 RAPORTY
function raporty(){
r_total.innerText=lista.length;
r_new.innerText=lista.filter(x=>x.status==="Nowe").length;
r_prog.innerText=lista.filter(x=>x.status==="W trakcie").length;
r_done.innerText=lista.filter(x=>x.status==="Zakończone").length;
}

</script>

</body>
</html>
